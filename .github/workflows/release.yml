name: Release

# Dispara quando uma tag começando com `v` é empurrada (ex.: v0.1.1, v1.0.0).
# Constrói o instalador Windows e publica numa GitHub Release. O `latest.yml`
# gerado pelo electron-builder permite que clientes em campo recebam a
# atualização automaticamente via electron-updater.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & publish Windows installer
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle (typecheck + electron-vite)
        run: npm run build

      - name: Build & publish installer
        env:
          # Permite ao electron-builder criar/atualizar a Release no GitHub.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
