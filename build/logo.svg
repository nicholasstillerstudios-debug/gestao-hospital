<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo do Gestão Hospitalar.
  Quadrado arredondado em gradiente cyan, com cruz médica branca e linha de
  pulso (ECG) atravessando horizontalmente. Usada para o instalador, ícone
  do app e dentro da UI (renderizada via BrandLogo.tsx ou diretamente).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Gestão Hospitalar">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="cross-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f7ff"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg-grad)"/>

  <!-- Borda interna sutil -->
  <rect x="20" y="20" width="472" height="472" rx="92" ry="92" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Cruz médica (centralizada) -->
  <g filter="url(#soft-shadow)">
    <!-- Braço vertical -->
    <rect x="216" y="104" width="80" height="304" rx="20" ry="20" fill="url(#cross-grad)"/>
    <!-- Braço horizontal -->
    <rect x="104" y="216" width="304" height="80" rx="20" ry="20" fill="url(#cross-grad)"/>
  </g>

  <!-- Linha de pulso (ECG) atravessando a cruz -->
  <path
    d="M 80 256 L 168 256 L 192 224 L 224 296 L 256 200 L 288 296 L 320 224 L 344 256 L 432 256"
    fill="none"
    stroke="#0e7490"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.95"
  />
  <!-- Pulso branco fino sobre o azul, dando o efeito de "linha viva" -->
  <path
    d="M 80 256 L 168 256 L 192 224 L 224 296 L 256 200 L 288 296 L 320 224 L 344 256 L 432 256"
    fill="none"
    stroke="#ffffff"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.9"
  />
</svg>
